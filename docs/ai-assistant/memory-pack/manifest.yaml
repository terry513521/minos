name: Minos SN107 Public Knowledge Graph
version: 1.0.0
description: Public-safe Minos subnet 107 knowledge pack for miners, validators, and agent runtimes.
canonical_source: docs/ai-assistant/memory-pack
privacy: public_only
published_providers:
  ditto:
    handle: "@minos"
    graph_name: Minos SN107 Public Knowledge Graph
    profile: https://share.heyditto.ai/@minos
    subscription_script: scripts/setup_ditto_agent.sh

bootstrap:
  minosvm_first_run: bash scripts/minosvm_first_run.sh
  prompt: bash scripts/prompt_ai_assistant.sh
  ditto_only: bash scripts/setup_ditto_agent.sh
  guided_ai_assistant: bash scripts/setup_ai_assistant.sh
  start_miner_ditto: bash start-miner.sh --setup-ditto
  start_miner_ai_assistant: bash start-miner.sh --setup-ai-assistant

runtime_assets:
  portable_skill: docs/ai-assistant/minos-miner-skill
  openclaw_workspace_templates: docs/ai-assistant/openclaw-workspace
  hermes_soul_template: docs/ai-assistant/hermes/SOUL.minos-miner-template.md
  model_provider_setup: docs/ai-assistant/model-provider-setup.md

template_targets:
  ditto:
    provider: Ditto
    name: Minos SN107 Public Knowledge Graph
    purpose: Public support memory for Minos subnet 107 miners, validators, and agent runtimes.
    update_model: public_knowledge_graph_subscription
    fallback_model: private_agent_memory_seed_from_graph_seed_order
  mcp:
    provider: Minos MCP
    purpose: Public live-data tool layer paired with the same Minos knowledge pack.
    update_model: live_public_tools_plus_versioned_public_resources


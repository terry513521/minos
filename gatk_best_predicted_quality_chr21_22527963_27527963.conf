# Quality-push predicted GATK config for chr21:22527963-27527963
#
# Purpose:
# - The nearest 96.01 config already maxed Core, Completeness, and FP points.
# - Its lost points were mainly Quality, so this variant nudges the priors that
#   correlate positively with score and quality while keeping overcall-risk
#   parameters conservative.
#
# Changes from exact nearby:
# - min_base_quality_score: 8 -> 6
# - min_mapping_quality_score: 22 -> 13
# - base_quality_score_threshold: 22 -> 15
# - heterozygosity: 0.005 -> 0.006
# - indel_heterozygosity: 0.0004 -> 0.0005
# - contamination_fraction_to_filter: 0.15 -> 0.12

min_base_quality_score=6
min_mapping_quality_score=13
base_quality_score_threshold=15

standard_min_confidence_threshold_for_calling=20
emit_ref_confidence=NONE

pcr_indel_model=NONE

min_pruning=1
max_alternate_alleles=15
min_dangling_branch_length=2
recover_all_dangling_branches=false
max_num_haplotypes_in_population=224
adaptive_pruning_initial_error_rate=0.002
pruning_lod_threshold=4.036

active_probability_threshold=0.002
min_assembly_region_size=20
max_assembly_region_size=300
assembly_region_padding=80

pair_hmm_gap_continuation_penalty=13
phred_scaled_global_read_mismapping_rate=35

heterozygosity=0.006
indel_heterozygosity=0.0005
sample_ploidy=2
contamination_fraction_to_filter=0.12

max_reads_per_alignment_start=28

dont_use_soft_clipped_bases=false

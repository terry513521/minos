# FreeBayes Quality Parameters
#
# DEPRECATED 2026-05-09 16:00 UTC. The platform rejects new freebayes
# submissions with HTTP 400. This file is retained so historical rounds
# can be replayed and the runner code parses cleanly; both the file and
# the runner will be removed in a follow-up release once in-flight
# pre-cutover rounds finish scoring. New miners: pick gatk, deepvariant,
# or bcftools instead.
#
# Adjust these values to optimize variant calling quality.
# Only quality-affecting params — threads, memory, timeout are auto-detected.

# --- Quality filtering ---

# Exclude alignments with mapping quality less than this (0-60)
min_mapping_quality=1

# Exclude alleles with supporting base quality less than this (0-50)
min_base_quality=1

# Cap all base qualities at this value, 0 to disable (0-60)
base_quality_cap=0

# --- Allele detection thresholds ---

# Minimum fraction of observations supporting an alternate allele (0.0-1.0)
min_alternate_fraction=0.05

# Minimum count of observations supporting an alternate allele (1-100)
min_alternate_count=2

# Minimum sum of base qualities supporting the alternate allele (0-10000)
min_alternate_qsum=0

# --- Coverage ---

# Minimum coverage to process a site, 0 to disable (0-1000)
min_coverage=0

# --- Read filtering ---

# Base quality threshold for counting mismatches in read filtering (0-60)
mismatch_base_quality_threshold=10

# Max fraction of read bases that can be mismatches before excluding read (0.0-1.0, 1.0=disabled)
read_max_mismatch_fraction=1.0

# --- Genotype likelihood / priors ---

# Population-scaled mutation rate (Ewens sampling formula prior) (0.0-0.1)
theta=0.001

# Observation independence scaling factor; lower discounts redundant evidence (0.0-1.0)
read_dependence_factor=0.9

# Minimum posterior probability of a variant to report it (0.0-1.0, 0.0=report all)
pvar=0.0

# Incorporate mapping quality into data likelihood calculations (true/false)
use_mapping_quality=false

# Use harmonic mean of flanking base qualities for indels instead of minimum (true/false)
harmonic_indel_quality=false

# --- Prior model toggles ---

# Disable Hardy-Weinberg Equilibrium prior (true/false)
hwe_priors_off=false

# Disable binomial observation priors (true/false)
binomial_obs_priors_off=false

# Disable allele balance probability prior (true/false)
allele_balance_priors_off=false

# --- Contamination ---

# Prior probability that a read comes from a contaminating sample (0.0-1.0)
prob_contamination=0.0

# --- Population genetics ---

# Ploidy for the analysis, 2 for diploid organisms (1-10)
ploidy=2

# Evaluate only the best N SNP alleles, 0 for all (0-20)
use_best_n_alleles=0

# --- Haplotype / complex variants ---

# Max length for contiguous embedded matches in haplotype calls (0-100)
max_complex_gap=3

# Minimum entropy for a repeat to be considered, lower = more permissive (0-4)
min_repeat_entropy=1

# Minimum total length of a short tandem repeat region for repeat-aware calling (1-100)
min_repeat_size=5

# --- Algorithm ---

# Max depth of banded genotype likelihood calculation (1-20)
genotyping_max_banddepth=7
